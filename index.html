<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Michael C. Torres | Portfolio</title>
<style>
  body {
    font-family: Arial, sans-serif;
    max-width: 900px;
    margin: auto;
    padding: 20px;
    line-height: 1.6;
    background-color: #ffffff;
  }

  header {
    text-align: center;
    margin-bottom: 30px;
    padding: 0px 0px;
    background-color: #ffffff; /* Header background */
    border-radius: 0px;
  }

  header h1 {
    margin-bottom: 5px;
  }

  header p {
    font-style: italic;
    color: #555;
    margin-top: 0;
  }

  h2 {
    text-align: center;
    margin-top: 40px;
    margin-bottom: 20px;
    color: #222;
  }

  ul {
    list-style-type: none;
    padding-left: 0;
    text-align: center;
    display: flex;           /* horizontal row */
    justify-content: center; /* center the buttons */
    gap: 20px;               /* space between buttons */
    flex-wrap: wrap;         /* responsive wrap */
  }

  li {
    margin: 0;
  }

  a {
    text-decoration: none;
    color: #111;
    font-weight: bold;
    padding: 10px 20px;
    border: 2px solid #111;
    border-radius: 5px;
    transition: all 0.3s ease;
    display: inline-block;
  }

  a:hover {
    background-color: #111;
    color: #fff;
  }

  .about-img {
    max-width: 1024px;
    width: 100%;
    display: block;
    margin: 20px auto;
    border-radius: 0;
  }

  .about-text {
    text-align: center;
    margin-top: 10px;
  }

.header-img {
  max-width: 2048px;  /* adjust size kung gusto mo mas maliit o malaki */
  width: 100%;        /* responsive sa screen */
  display: block;
  margin: 0 auto;     /* center horizontally */
  border-radius: 0;   /* walang rounded edges */
}

footer {
  text-align: center;
  background-color: #02084b;   /* dark background */
  color: #ffffff;              /* white text */
  padding: 10px 0;             /* space sa taas at baba */
  border-bottom: 2px solid #02084b; /* colored border sa ibaba */
  position: relative;
  width: 100%;
  box-sizing: border-box;
}

  #lightbox {
  display: none;
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  background: rgba(0,0,0,0.9);
  justify-content: center;
  align-items: center;
  z-index: 1000;
}

#lightbox img {
  max-width: 90%;
  max-height: 90%;
}
</style>
</head>
  <div id="lightbox" onclick="closeImage()">
  <img id="lightbox-img">
</div>

<script>
function openImage(img) {
  document.getElementById("lightbox").style.display = "flex";
  document.getElementById("lightbox-img").src = img.src;
}

function closeImage() {
  document.getElementById("lightbox").style.display = "none";
}
</script>
<body>

<header>
  <img src="images/introportfolio.jpg" alt="Michael C. Torres" class="header-img" onclick="openImage(this)">
</header>

<section>
  <h2>About Me</h2>
  <img src="images/profile.jpg" alt="Michael C. Torres" class="about-img">
</section>

<section>
  <h2>Experience</h2>
  <ul>
    <li><a href="marketing-assistant.html">Marketing Assistant</a></li>
    <li><a href="operations-assistant.html">Operations Assistant</a></li>
    <li><a href="additionals.html">Additionals</a></li>
  </ul>
</section>
<footer>
  <p>© 2026 Michael C. Torres - All rights reserved</p>
</footer>

</body>

</html>
